{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer Login — CivicReporter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a1a 0%, #0f0a2e 40%, #1a0a3e 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  /* Animated background orbs */
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
  .orb-1 { width: 500px; height: 500px; background: rgba(79,70,229,0.15); top: -100px; right: -100px; }
  .orb-2 { width: 400px; height: 400px; background: rgba(124,58,237,0.1);  bottom: -80px; left: -80px; }
  .orb-3 { width: 200px; height: 200px; background: rgba(16,185,129,0.08); top: 40%; left: 40%; }

  .login-card {
    position: relative; z-index: 2;
    width: 420px; max-width: 95vw;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 2.5rem 2rem;
    backdrop-filter: blur(24px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }

  .brand {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 2rem; justify-content: center;
  }
  .brand-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg,#4f46e5,#7c3aed);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; color: #fff;
    box-shadow: 0 4px 16px rgba(79,70,229,0.5);
  }
  .brand-name { font-size: 1.25rem; font-weight: 800; color: #fff; }

  .badge-officer {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
    border-radius: 999px; padding: 0.3rem 0.85rem;
    font-size: 0.72rem; font-weight: 700; color: #34d399;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 1.5rem;
  }

  h1 { font-size: 1.5rem; font-weight: 900; color: #fff; margin-bottom: 0.4rem; }
  .subtitle { font-size: 0.83rem; color: rgba(255,255,255,0.45); margin-bottom: 1.75rem; }

  .field { margin-bottom: 1rem; }
  .field label {
    display: block; font-size: 0.75rem; font-weight: 700;
    color: rgba(255,255,255,0.5); text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 0.5rem;
  }
  .field-wrap { position: relative; }
  .field-icon {
    position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,0.3); font-size: 0.9rem; pointer-events: none;
  }
  .field input {
    width: 100%; background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 0.8rem 1rem 0.8rem 2.75rem;
    font-size: 0.9rem; color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    outline: none; transition: all 0.25s;
  }
  .field input::placeholder { color: rgba(255,255,255,0.2); }
  .field input:focus {
    border-color: #6366f1;
    background: rgba(99,102,241,0.08);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }

  .error-box {
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px; padding: 0.65rem 0.9rem;
    font-size: 0.8rem; color: #fca5a5;
    margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
  }

  .btn-login {
    width: 100%; padding: 0.9rem;
    background: linear-gradient(135deg,#4f46e5,#7c3aed);
    border: none; border-radius: 14px;
    color: #fff; font-size: 0.95rem; font-weight: 800;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer; margin-top: 0.5rem;
    box-shadow: 0 8px 28px rgba(79,70,229,0.45);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn-login:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(79,70,229,0.6); }

  .divider { text-align: center; margin: 1.5rem 0 0.5rem; }
  .divider a {
    font-size: 0.78rem; color: rgba(255,255,255,0.3);
    text-decoration: none; transition: color 0.2s;
  }
  .divider a:hover { color: #a5b4fc; }

  .footer-note {
    margin-top: 2rem; padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.73rem; color: rgba(255,255,255,0.2);
    justify-content: center;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-city"></i></div>
      <span class="brand-name">CivicReporter</span>
    </div>

    <div style="text-align:center;">
      <div class="badge-officer"><i class="fa-solid fa-shield-halved"></i> Officer Portal</div>
    </div>

    <h1 style="text-align:center;">Municipal Officer Login</h1>
    <p class="subtitle" style="text-align:center;">Access your complaint management dashboard</p>

    {% if error %}
    <div class="error-box">
      <i class="fa-solid fa-circle-exclamation"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="field">
        <label>Officer Username</label>
        <div class="field-wrap">
          <i class="fa-solid fa-user field-icon"></i>
          <input type="text" name="username" placeholder="Enter your username" required autofocus>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
        Sign In to Dashboard
      </button>
    </form>

    <div class="divider">
      <a href="{% url 'home' %}"><i class="fa-solid fa-arrow-left" style="font-size:0.7rem;"></i> Back to citizen portal</a>
    </div>

    <div class="footer-note">
      <i class="fa-solid fa-shield-halved"></i>
      Restricted to authorised municipal officers only
    </div>
  </div>
</body>
</html>
