{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden glass-card">
                <div class="card-header bg-white text-center py-4 border-0" style="background: transparent !important;">
                    <h3 class="mb-0 fw-bold text-primary"><i class="fa-solid fa-right-to-bracket me-2"></i> Welcome Back</h3>
                    <p class="text-muted small mt-2 mb-0">Login to your Civic Reporter account.</p>
                </div>
                <div class="card-body p-4 p-md-5 pt-0">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Login</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-light border-0 text-center py-3">
                    <p class="mb-0 text-muted small">Don't have an account? <a href="{% url 'register' %}" class="fw-bold text-primary text-decoration-none">Sign up here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
